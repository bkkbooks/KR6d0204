body:
  text: 霅溪沙門仁嶽撰僧祇律云佛生日乃至涅槃日當為大衆稱揚佛德豫早歲讀大涅槃經採雙林示滅之相撰偈以聲之比有吾宗好事者請四月八日浴佛形像次亦陳讚頌所貴僧祇之式始終備焉於是討太子本起及因果等經所說事類略為十讚并五悔法次第于後原夫如來應物之相機見有殊是故乘白象入胎御香樓託陰不可同也今依小教祇就鹿苑已前取其行因趣果之事以成章句若五時化迹非此具道苟曰狂斐試為裁之道場僧集先禮三寶次浴佛像互跪燒香各有偈辭附于卷末粵若三光照世無盛於日輪四聖化人最尊於佛道然以大明易度正覺難逢故長夜之彌昏致羣生之弗悟伏自仁賢劫減濁惡趣增當堪忍以無師會能儒而出世示同剎利非為七寶之王取證菩提遂作千華之主形聲赴物勝劣隨機化儀雖有於始終真法本無於來去今值三時春季八相生辰懷疇昔之因緣敢申讚詠備以時之供養聊表勤誠惟願聖慈俯垂明鑒一心奉請堪忍世界示現降生釋迦文佛惟願降臨道場受我供養天上天下無如佛十方世界亦無比世間所有我盡見一切無有如佛者至此或陳敘或宣疏稱佛等以臨時自裁然後禮讚唱云一心頂禮然燈佛所受能仁記莂時身釋迦文佛下皆例此過去久行菩薩道爾時值佛號然燈曾為摩納奉慈悲因與瞿夷修供養布髮掩泥承足下散華成蓋住空中從茲法忍得無生親受釋迦文佛記故我一心歸命頂禮下皆例此一心頂禮兜率天上示一生補處時身一生當證能仁果補處爰升喜樂天既超欲地在空居時為勞生談正法劫火莫能焚此界毫光仍得照諸禪佇觀機熟下生來普使盲冥開慧眼一心頂禮迦維衛國託摩耶懷妊時身託識后妃名大術流光中印屬迦維應夢潛通玉象形處胎真是金輪種十月已宣聲密教諸天先見相嚴身仁賢劫內大空虗將慶曇華時一現一心頂禮無憂樹下誕王妃右脅時身聖后入園攀樹次怡然右脅産金軀才行七步現殊祥復指二儀稱最勝天雨細香皆潤澤地開伏藏悉精明珍重阿夷百歲人占言相好當成佛一心頂禮東宮受職現納妃厭欲時身太子妙年方齒學父王求娉得耶輸雖將五欲每勾牽但見諸根常寂靜蓮生濁水心元淨金在紅爐體莫渝徒增寶媛鎮相隨終被智刀刲愛網一心頂禮四門遊觀覩無常樂道時身嚴駕四門觀四相淨居天子化諸塗始逢衰老歎無常後見真僧欣有道聖意豈存行樂事空聲唯贊出塵緣指腹留娠嗣父王一心秪待離宮室一心頂禮春宮午夜踰國城出俗時身天語出家時已至便捐王國指他山中宵禁闥自然開千里神駒超忽去車匿還宮迷遠道耶輸懷子守空帷萬乘追蹤竟不回翻令淨飯遙瞻禮一心頂禮伽耶山內修六年苦行時身五人侍衛皆中止六載修行且外求雪嶺無春任苦寒朱顏未老同憔悴麻麥充飢寧是道斷常習定亦非真斯為方便化衆生漸引邪徒歸正覺一心頂禮熙連河畔受難陀施食時身大權將應人天供先受難陀獻乳糜菩薩雖資妙色身遮那豈假珍羞味落髮已歸忉利主傳衣元自飲光師行看道樹近菩提步步方輿皆震動一心頂禮金剛座上降天魔成道時身籍草結趺過永夜圓成三十四心時九地塵勞既斷除六天魔事俱降伏大梵佇聞甘露鼓羣生來覲紫金山由是隨宜轉法輪人到于今咸受賜至此復跪秉爐運想披陳五悔至心懺悔我等自從有識隨順無明在惡趣以悠長任苦輪而旋轉佛興忍界不逢萬德之尊法被勞生莫奉一音之教良以罪根深固善種微冥非應化之有偏乃業緣之為障猶賴貝書西載筏喻東流得聞於我佛降生似值於爾時歸命悲欣兩集慙愧重增今對道場故伸懺悔懺悔已至心歸命三寶餘皆例此至心勸請恭請十方法界諸佛世尊或生五濁之鄉當說三乘之道慧雲所覆法雨其䨦庶使羣萌悉皆充潤至心隨喜所有世間出世一切善根若無漏之真乘或有為之福聚我皆隨喜靡擇怨親期未來時會平等地至心回向以此如來功德少分稱揚盡回向於真空及莊嚴於佛果亦冀多生所集衆善無遺普施有情同成實道至心發願願我自凡至聖此界他方遍於有佛之時咸覩降靈之相初聞音教便入於大乘頓出塵勞即登於彼岸右旋道場稱釋迦佛號或諷安樂行品盡誠而退浴佛形像案浴像功德經清淨慧菩薩白佛如來滅後未來世中諸衆生等云何浴像佛言應以牛頭旃檀多摩羅香甘松芎藭金龍腦沉香麝香丁香以如是等種種妙香隨所得者以為湯水置淨器中用諸香水次第浴訖復以淨水淋洗其像如是浴者各取少許洗像之水置自頭上然後燒種種香而為供養浴佛偈我今灌沐諸如來淨智功德莊嚴聚五濁衆生令離垢願證如來淨法身燒香偈戒定慧解知見香遍十方剎常芬馥願此香煙亦如是回作自他五種身
